name: "JAIPilot - Reach 80%+ Unit Test Coverage on Every PR"
description: "Achieve 80%+ unit test coverage on every PR by automatically generating production-ready tests for Java (Maven & Gradle)."
author: "JAIPilot"

branding:
  icon: "shield"
  color: "blue"

inputs:
  working-directory:
    description: "Project directory in which JAIPilot runs."
    required: false
    default: "."
  java-version:
    description: "Temurin Java version to install before running JAIPilot."
    required: false
    default: "21"
  jaipilot-auth-token:
    description: "JAIPilot runtime token. If omitted, the action auto-exchanges GitHub OIDC for a short-lived runtime token when available."
    required: false
  jaipilot-token-endpoint:
    description: "Optional override for the JAIPilot OIDC exchange endpoint."
    required: false
    default: ""
  jaipilot-oidc-audience:
    description: "GitHub OIDC audience used during runtime token exchange."
    required: false
    default: "jaipilot-github-app"
  fail-on-generate-error:
    description: "Fail the workflow if generation fails for one or more classes."
    required: false
    default: "true"
  commit-message:
    description: "Commit message for generated test changes."
    required: false
    default: "chore: generate tests with JAIPilot"
  git-user-name:
    description: "Git author name for the generated commit."
    required: false
    default: "github-actions[bot]"
  git-user-email:
    description: "Git author email for the generated commit."
    required: false
    default: "41898282+github-actions[bot]@users.noreply.github.com"

outputs:
  processed-classes:
    description: "Number of changed Java production classes processed."
    value: ${{ steps.generate.outputs.processed-classes }}
  failed-classes:
    description: "Number of classes for which generation failed."
    value: ${{ steps.generate.outputs.failed-classes }}
  commit-sha:
    description: "Commit SHA pushed by this action. Empty if no changes were committed."
    value: ${{ steps.commit.outputs.commit-sha }}

runs:
  using: "composite"
  steps:
    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: "temurin"
        java-version: ${{ inputs.java-version }}

    - name: Install JAIPilot
      shell: bash
      run: |
        set -euo pipefail
        bash "${{ github.action_path }}/install.sh"
        echo "${HOME}/.local/bin" >> "${GITHUB_PATH}"

    - name: Generate tests for changed Java production classes
      id: generate
      shell: bash
      run: |
        set -euo pipefail

        workdir="${{ inputs.working-directory }}"
        if [ ! -d "$workdir" ]; then
          echo "Working directory does not exist: $workdir" >&2
          exit 1
        fi
        cd "$workdir"

        if [ -n "${{ inputs.jaipilot-token-endpoint }}" ]; then
          export JAIPILOT_TOKEN_ENDPOINT="${{ inputs.jaipilot-token-endpoint }}"
        fi
        export JAIPILOT_OIDC_AUDIENCE="${{ inputs.jaipilot-oidc-audience }}"

        effective_auth="$("${{ github.action_path }}/scripts/resolve-jaipilot-auth.sh" "${{ inputs.jaipilot-auth-token }}")"
        export JAIPILOT_AUTH_TOKEN="$effective_auth"

        changed_files=""

        if [ -n "${GITHUB_BASE_REF:-}" ]; then
          echo "Running in pull_request context against base branch: ${GITHUB_BASE_REF}"
          git fetch --no-tags --depth=1 origin "${GITHUB_BASE_REF}"
          changed_files="$(git diff --name-only "origin/${GITHUB_BASE_REF}...HEAD")"
        else
          echo "Running in push context"
          if git rev-parse --verify HEAD~1 >/dev/null 2>&1; then
            changed_files="$(git diff --name-only HEAD~1 HEAD)"
          else
            echo "No previous commit found; using all tracked files in the current commit."
            changed_files="$(git ls-files)"
          fi
        fi

        mapfile -t java_files < <(
          printf '%s\n' "$changed_files" \
            | sed '/^$/d' \
            | grep '\.java$' || true
        )

        filtered_java_files=()
        for class_path in "${java_files[@]}"; do
          case "$class_path" in
            */src/test/*|*Test.java|*Tests.java|*IT.java|*ITCase.java)
              continue
              ;;
          esac

          if [ ! -f "$class_path" ]; then
            echo "Skipping missing file: $class_path"
            continue
          fi

          filtered_java_files+=("$class_path")
        done

        if [ "${#filtered_java_files[@]}" -eq 0 ]; then
          echo "No changed Java production classes found."
          echo "processed-classes=0" >> "${GITHUB_OUTPUT}"
          echo "failed-classes=0" >> "${GITHUB_OUTPUT}"
          echo "JAIPILOT_GENERATE_FAILED=0" >> "${GITHUB_ENV}"
          exit 0
        fi

        mapfile -t java_files < <(
          printf '%s\n' "${filtered_java_files[@]}" | LC_ALL=C sort -u
        )

        echo "Changed Java production classes to process:"
        printf ' - %s\n' "${java_files[@]}"

        processed=0
        failed=0
        declare -A coverage_by_class=()

        for class_path in "${java_files[@]}"; do
          processed=$((processed + 1))
          echo "[$processed/${#java_files[@]}] jaipilot generate $class_path"
          class_log_file="$(mktemp)"
          if jaipilot generate "$class_path" 2>&1 | tee "$class_log_file"; then
            summary_line="$(grep 'JAIPILOT_COVERAGE_SUMMARY|' "$class_log_file" | tail -n 1 || true)"
            if [ -n "$summary_line" ]; then
              summary_payload="${summary_line#*JAIPILOT_COVERAGE_SUMMARY|}"
              summary_class="${summary_payload%%|*}"
              if [ -n "$summary_class" ]; then
                coverage_by_class["$summary_class"]="$summary_payload"
              fi
            fi
          else
            summary_line="$(grep 'JAIPILOT_COVERAGE_SUMMARY|' "$class_log_file" | tail -n 1 || true)"
            if [ -n "$summary_line" ]; then
              summary_payload="${summary_line#*JAIPILOT_COVERAGE_SUMMARY|}"
              summary_class="${summary_payload%%|*}"
              if [ -n "$summary_class" ]; then
                coverage_by_class["$summary_class"]="$summary_payload"
              fi
            fi
            failed=$((failed + 1))
            echo "Generation failed for: $class_path" >&2
          fi
          rm -f "$class_log_file"
        done

        if [ "${#coverage_by_class[@]}" -gt 0 ]; then
          echo "Coverage summary for generated classes in this PR:"
          for class_path in "${java_files[@]}"; do
            summary_payload="${coverage_by_class[$class_path]-}"
            if [ -z "$summary_payload" ]; then
              continue
            fi
            IFS='|' read -r summary_class summary_before summary_after summary_delta <<< "$summary_payload"
            echo " - ${summary_class}: before=${summary_before}, after=${summary_after}, delta=${summary_delta}"
          done
        fi

        mapfile -d '' -t classpath_artifacts < <(find . -type f -name '.classpath.txt' -print0)
        if [ "${#classpath_artifacts[@]}" -gt 0 ]; then
          echo "Cleaning generated classpath artifacts:"
          for artifact_path in "${classpath_artifacts[@]}"; do
            rel_artifact_path="${artifact_path#./}"
            echo " - $rel_artifact_path"
            if git ls-files --error-unmatch -- "$rel_artifact_path" >/dev/null 2>&1; then
              git restore --worktree -- "$rel_artifact_path"
            else
              rm -f -- "$artifact_path"
            fi
          done
        fi

        echo "processed-classes=$processed" >> "${GITHUB_OUTPUT}"
        echo "failed-classes=$failed" >> "${GITHUB_OUTPUT}"
        echo "JAIPILOT_GENERATE_FAILED=$failed" >> "${GITHUB_ENV}"

    - name: Commit and push generated changes
      id: commit
      shell: bash
      run: |
        set -euo pipefail

        workdir="${{ inputs.working-directory }}"
        cd "$workdir"

        if [ -z "$(git status --porcelain)" ]; then
          echo "No generated changes to commit."
          echo "commit-sha=" >> "${GITHUB_OUTPUT}"
          exit 0
        fi

        git config user.name "${{ inputs.git-user-name }}"
        git config user.email "${{ inputs.git-user-email }}"

        git add -A
        mapfile -t excluded_files < <(
          git ls-files --cached --others --exclude-standard \
            | grep -E '(^|/)\\.classpath\\.txt$' || true
        )
        if [ "${#excluded_files[@]}" -gt 0 ]; then
          echo "Excluding generated classpath artifacts from commit:"
          printf ' - %s\n' "${excluded_files[@]}"
          git restore --staged -- "${excluded_files[@]}" || true
          for excluded_file in "${excluded_files[@]}"; do
            if git ls-files --error-unmatch -- "$excluded_file" >/dev/null 2>&1; then
              git restore --worktree -- "$excluded_file"
            else
              rm -f -- "$excluded_file"
            fi
          done
        fi

        if git diff --cached --quiet; then
          echo "No staged changes after git add."
          echo "commit-sha=" >> "${GITHUB_OUTPUT}"
          exit 0
        fi

        git commit -m "${{ inputs.commit-message }}"

        target_branch="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME:-}}"
        if [ -z "$target_branch" ]; then
          echo "Unable to detect target branch (GITHUB_HEAD_REF/GITHUB_REF_NAME is empty)." >&2
          exit 1
        fi

        git push origin "HEAD:${target_branch}"
        echo "commit-sha=$(git rev-parse HEAD)" >> "${GITHUB_OUTPUT}"

    - name: Fail if generation errors occurred
      if: ${{ inputs.fail-on-generate-error == 'true' }}
      shell: bash
      run: |
        set -euo pipefail
        failed="${JAIPILOT_GENERATE_FAILED:-0}"
        if [ "$failed" -gt 0 ]; then
          echo "JAIPilot generation failed for $failed classes." >&2
          exit 1
        fi
